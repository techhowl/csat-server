# Development stack. Start with `make dev`, stop with `make down`.
# All three Node services share one dev image and the same bind-mounted source;
# only the start command differs.
#
# Secrets are NOT in .env anymore — they live in Infisical. The `dev:*` npm
# scripts wrap each process in `infisical run`, which fetches secrets at boot
# using INFISICAL_TOKEN + INFISICAL_API_URL. Export those on the host first:
#   export INFISICAL_API_URL=https://<infisical-host>/api
#   export INFISICAL_TOKEN=$(infisical login --method=universal-auth \
#       --client-id=$INFISICAL_CLIENT_ID --client-secret=$INFISICAL_CLIENT_SECRET --plain --silent)
# (see .env.bootstrap.example). Then `make dev`.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run dev:api
    environment:
      - INFISICAL_API_URL=${INFISICAL_API_URL}
      - INFISICAL_TOKEN=${INFISICAL_TOKEN}
      - INFISICAL_PROJECT_ID=1132a6a9-384e-46be-89f2-695627f7bf39
      - INFISICAL_ENV=dev
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - csat

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run dev:worker
    environment:
      - INFISICAL_API_URL=${INFISICAL_API_URL}
      - INFISICAL_TOKEN=${INFISICAL_TOKEN}
      - INFISICAL_PROJECT_ID=1132a6a9-384e-46be-89f2-695627f7bf39
      - INFISICAL_ENV=dev
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - csat

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run dev:scheduler
    environment:
      - INFISICAL_API_URL=${INFISICAL_API_URL}
      - INFISICAL_TOKEN=${INFISICAL_TOKEN}
      - INFISICAL_PROJECT_ID=1132a6a9-384e-46be-89f2-695627f7bf39
      - INFISICAL_ENV=dev
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - csat

networks:
  csat:
    driver: bridge
